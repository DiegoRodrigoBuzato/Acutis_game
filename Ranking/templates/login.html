{% extends "base.html" %}
{% block title %}Login — Acutis Game{% endblock %}

{% block content %}
<div style="max-width:440px; margin:3rem auto;">
    <div class="text-center mb-3">
        <div style="font-size:3rem; margin-bottom:1rem;">🎮</div>
        <h1 class="section-title"><span class="accent">LOGIN</span></h1>
        <p class="text-muted">Entre com sua conta para participar</p>
    </div>

    <div class="card card-glow">
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label class="form-label"><i class="fas fa-envelope"></i> E-mail</label>
                <input type="email" name="email" class="form-control"
                       placeholder="seu@email.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label class="form-label"><i class="fas fa-lock"></i> Senha</label>
                <input type="password" name="senha" class="form-control"
                       placeholder="••••••••" required autocomplete="current-password">
            </div>

            <div class="mt-3">
                <button type="submit" class="btn btn-primary btn-lg btn-block">
                    <i class="fas fa-sign-in-alt"></i> ENTRAR
                </button>
            </div>
        </form>

        <hr class="divider">

        <p class="text-center text-muted" style="font-size:.9rem;">
            Ainda não tem conta?
            <a href="{{ url_for('auth.cadastro') }}" style="color:var(--azul-claro);">
                Cadastre-se aqui →
            </a>
        </p>
    </div>
</div>
{% endblock %}
