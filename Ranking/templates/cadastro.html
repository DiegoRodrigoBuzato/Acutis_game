{% extends "base.html" %}
{% block title %}Cadastro — Acutis Game{% endblock %}

{% block content %}
<div style="max-width:520px; margin:2rem auto;">
    <div class="text-center mb-3">
        <div style="font-size:3rem; margin-bottom:1rem;">⚡</div>
        <h1 class="section-title"><span class="accent">CADASTRO</span></h1>
        <p class="text-muted">Crie sua conta e entre na batalha pelo ranking</p>
    </div>

    <div class="card card-glow">
        <form method="POST" action="{{ url_for('auth.cadastro') }}" enctype="multipart/form-data">
            <div class="grid-2">
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-user"></i> Nome Completo</label>
                    <input type="text" name="nome" class="form-control"
                           placeholder="Seu nome" value="{{ nome or '' }}" required>
                </div>

                <div class="form-group">
                    <label class="form-label"><i class="fas fa-at"></i> Nickname</label>
                    <input type="text" name="nickname" class="form-control"
                           placeholder="SeuNick" value="{{ nickname or '' }}" required
                           pattern="[A-Za-z0-9_-]{3,30}" title="Letras, números, _ e - (3–30 chars)">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label"><i class="fas fa-envelope"></i> E-mail</label>
                <input type="email" name="email" class="form-control"
                       placeholder="seu@email.com" value="{{ email or '' }}" required>
            </div>

            <div class="form-group">
                <label class="form-label"><i class="fab fa-whatsapp"></i> WhatsApp</label>
                <input type="tel" name="whatsapp" class="form-control"
                       placeholder="(11) 99999-9999" value="{{ whatsapp or '' }}" required>
            </div>

            <div class="form-group">
                <label class="form-label"><i class="fas fa-lock"></i> Senha</label>
                <input type="password" name="senha" class="form-control"
                       placeholder="Mínimo 4 caracteres" required minlength="4">
            </div>

            <div class="form-group">
                <label class="form-label"><i class="fas fa-image"></i> Avatar (opcional)</label>
                <input type="file" name="avatar" class="form-control"
                       accept="image/jpg,image/jpeg,image/png,image/webp,image/gif">
                <small style="color:var(--text-dim); font-size:.78rem;">JPG, PNG, GIF ou WEBP (máx. 5MB)</small>
            </div>

            <div class="mt-3">
                <button type="submit" class="btn btn-primary btn-lg btn-block">
                    <i class="fas fa-rocket"></i> CRIAR CONTA
                </button>
            </div>
        </form>

        <hr class="divider">

        <p class="text-center text-muted" style="font-size:.9rem;">
            Já tem conta?
            <a href="{{ url_for('auth.login') }}" style="color:var(--azul-claro);">
                Fazer login →
            </a>
        </p>
    </div>
</div>
{% endblock %}
